<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>San Citro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      height: 300px;
      overflow: hidden;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      color: #e0e0e0;
      user-select: none;
      -webkit-app-region: drag;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #e0e0ff;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: #8888aa;
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(100, 100, 180, 0.25);
      border-top-color: #6c6ce0;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .status {
      margin-top: 20px;
      font-size: 12px;
      color: #6666aa;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="title">San Citro</div>
  <div class="subtitle">Desktop Library</div>
  <div class="spinner"></div>
  <div class="status">Starting up...</div>
</body>
</html>
